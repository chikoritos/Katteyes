<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin"/>
    <title>Hinata ʚଓ am ꒰: </title>
  <link rel="icon" type="image/x-icon" href="https://xatimg.com/image/L34OILuxoAst.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
        }

        body {
            /* Background*/
            background: url('https://xatimg.com/image/xrMcBLblYCS1.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- LEFT TOOLBAR --- */
		
        .sidebar {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 15px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            border: 4px solid rgba(114, 115, 150, 0.2);
            box-shadow: 0 8px 32px 0 rgba(142, 68, 173, 0.15);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .sidebar a {
            color: #ffffff;
            font-size: 24px;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .sidebar a:hover, .sidebar a.active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.15);
            color: #e0b3ff;
            text-shadow: 0 0 15px #fff, 0 0 25px #c084fc;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5), inset 0 0 10px rgba(255, 255, 255, 0.3);
			border-color: #f472b6;
        }

        

        /* --- MIDDLE WINDOWS--- */
        .page-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
            backdrop-filter: blur(4px);
        }

        .page-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .center-window {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 70%;
            max-width: 800px;
            height: 75vh;
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            padding: 30px;
            display: none;
            flex-direction: column;
            position: relative;
            transform: scale(0.85);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .page-overlay.active .center-window.active {
            display: flex;
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(120, 113, 108, 0.2);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 16px;
            color: #444;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: #ef4444;
            color: white;
            transform: rotate(90deg);
        }

        .window-title {
            font-size: 24px;
            color: #4a044e;
            margin-bottom: 20px;
            border-bottom: 2px solid #e9d5ff;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .window-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* --- PHOTO GALERY--- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            width: 100%;
            height: 130px;
            background: #ddd;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-3px);
            border-color: #c084fc;
            box-shadow: 0 5px 15px rgba(168, 85, 247, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- YOUTUBE RESPONSIVE EMBED --- */
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 10px;
        }

        .video-embed-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Geniş Ekran Oranı */
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        .video-embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* --- (LIGHTBOX) --- */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox-overlay.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-img {
            max-width: 85%;
            max-height: 85vh;
            border-radius: 16px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .lightbox-overlay.active .lightbox-img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .lightbox-close:hover {
            background: #ef4444;
            transform: rotate(90deg);
        }

        /* Scrollbar */
        .window-content::-webkit-scrollbar { width: 6px; }
        .window-content::-webkit-scrollbar-track { background: transparent; }
        .window-content::-webkit-scrollbar-thumb { background: #c084fc; border-radius: 10px; }

        @media (max-width: 768px) {
            .sidebar { bottom: 20px; top: auto; left: 50%; transform: translateX(-50%); flex-direction: row; width: auto; padding: 10px 20px; }
            .center-window { width: 90%; height: 55vh; }
            .cute-card-btn .desc { display: none; }
        }

/* --- CUTE TOOLBAR (BUTON) --- */
        .cute-button-container {
            position: absolute;
            top: 1%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .cute-card-btn {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            border: 6px solid #d8b4fe;
            border-radius: 30px; /* Shape change, change oval*/
            padding: 10px 20px; /* Size Change Inner shape*/
            text-decoration: none;
            color: #6b21a8;
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.15);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .cute-card-btn .avatar {
            width: 45px;
            height: 45px;
            border-radius: 14px;
            margin-right: 15px;
            object-fit: cover;
            border: 3px solid #c084fc;
        }
        

        .cute-card-btn .avatar:hover {
            transform: translateY(2px) scale(1.02);
            box-shadow: 0 0 25px rgba(232, 121, 249, 0.5);
            background: rgba(255, 255, 255, 0.9);
            border-color: #f472b6;
        }



		

        .cute-card-btn .text-info {
            display: flex;
            flex-direction: column;
            margin-right: 20px;
        }

        .cute-card-btn .title {
            font-weight: bold;
            font-size: 22px;
            color: #581c87;
        }

        .cute-card-btn .desc {
            font-size: 11px;
            color: #701a75;
            opacity: 0.8;
        }

        .cute-card-btn .click-badge {
            background: #a855f7;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
		

        .cute-card-btn:hover {
            transform: translateY(2px) scale(1.02);
            box-shadow: 0 0 25px rgba(232, 121, 249, 0.5);
            background: rgba(255, 255, 255, 0.9);
            border-color: #f472b6;
        }

        .cute-card-btn:active {
            transform: translateY(4px) scale(0.98);
        }


/* --- Falling Hearts/Stars --- */

html:after {
  animation: grain 1s steps(10) infinite;
  background-image: url(https://64.media.tumblr.com/6cbaaa57c9c6924e39f2b018767af1db/tumblr_p4b0ujO8rg1qzm8dwo1_1280.gifv);
  content: "";
  height: 200%;
  left: -90%;
  opacity:.4;
  position: fixed;
  top: -5%;
  width: 200%;
  pointer-events:none;
}
@keyframes grain 
  70% { transform:translate(0%, 15%) }








		
    </style>
</head>
<body>

    <div class="cute-button-container">
        <a onclick="closeAllWindows()" class="cute-card-btn">
            <img src="https://xatimg.com/image/kLxuG60ryiTw.png" alt="Hinata" class="avatar">
            <div class="text-info">
                <span class="title">Cute</span>
                <span class="desc">really shy but kind, very gentle and sweet ʚଓ ꒰:</span>

            <div class="click-badge">Click</div>
        </a>
    </div>

    <nav class="sidebar">
        <a onclick="closeAllWindows()" title="Home" class="active" id="homeBtn"><i class="fa-solid fa-house"></i></a>
        <a onclick="openWindow('photosWindow', this)" title="Photos"><i class="fa-solid fa-images"></i></a>
        <a onclick="openWindow('youtubeWindow', this)" title="YouTube"><i class="fa-brands fa-youtube"></i></a>
        <a href="https://instagram.com" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://discord.gg/invitelink" target="_blank" title="Discord" style="background-color: rgba(88, 101, 242, 0.15);"><i class="fa-brands fa-discord"></i></a>
<a href="https://open.spotify.com/user/spotify" target="_blank" title="Spotify" class="spotify-btn"><i class="fa-brands fa-spotify"></i></a>
    </nav>

    <div class="page-overlay" id="pageOverlay" onclick="closeAllWindows()">
        
        <div class="center-window" id="photosWindow" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeAllWindows()"><i class="fa-solid fa-xmark"></i></button>
            <div class="window-title"><i class="fa-solid fa-images"></i> Photo Gallery</div>
            <div class="window-content">
                <div class="gallery-grid">
                    <div class="gallery-item"><img src="https://xatimg.com/image/FibYLe0QiE99.jpg" alt="Hinata 1" onclick="openLightbox(this.src)"></div>
                    <div class="gallery-item"><img src="https://xatimg.com/image/amQO1LNid352.jpg" alt="Hinata 2" onclick="openLightbox(this.src)"></div>
                    <div class="gallery-item"><img src="https://xatimg.com/image/NudHALqfmUvu.jpg" alt="Hinata 3" onclick="openLightbox(this.src)"></div>
                    <div class="gallery-item"><img src="https://xatimg.com/image/TsxXv6Ye6Rxr.jpg" alt="Hinata 4" onclick="openLightbox(this.src)"></div>
                    <div class="gallery-item"><img src="http://xatimg.com/image/e1DGTkr3WUDb.jpg" alt="Hinata 5" onclick="openLightbox(this.src)"></div>
                    <div class="gallery-item"><img src="https://xatimg.com/image/mEZdWySrUCRr.jpg" alt="Hinata 6" onclick="openLightbox(this.src)"></div>
				    <div class="gallery-item"><img src="https://xatimg.com/image/S2flXLPMsET6.jpg" alt="Hinata 7" onclick="openLightbox(this.src)"></div>
					<div class="gallery-item"><img src="https://xatimg.com/image/LN8Mql9fkxq8.gif" alt="Hinata 8" onclick="openLightbox(this.src)"></div>
					<div class="gallery-item"><img src="https://xatimg.com/image/2ZVksJ1SBHv2.jpg" alt="Hinata 9" onclick="openLightbox(this.src)"></div>
					<div class="gallery-item"><img src="https://xatimg.com/image/rhWa3vvGD0WX.jpg" alt="Hinata 10" onclick="openLightbox(this.src)"></div>
                </div>
            </div>
        </div>

        <div class="center-window" id="youtubeWindow" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeAllWindows()"><i class="fa-solid fa-xmark"></i></button>
            <div class="window-title"><i class="fa-brands fa-youtube"></i> YouTube Videos</div>
            <div class="window-content">
                <div class="video-list">
                    
                    <div class="video-embed-container">

                    </div>

                    <div class="video-embed-container">
                      
<iframe width="560" height="315" src="https://www.youtube.com/embed/ko70cExuzZM?si=HzivX4uCKlUy53PI" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    </div>

    <div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></button>
        <img src="" alt="Big size" class="lightbox-img" id="lightboxImg" onclick="event.stopPropagation()">
    </div>

    <script>
        const overlay = document.getElementById('pageOverlay');
        const sidebarLinks = document.querySelectorAll('.sidebar a');
        const homeBtn = document.getElementById('homeBtn');

        // Middle windows open
        function openWindow(windowId, element) {
            const windows = document.querySelectorAll('.center-window');
            windows.forEach(win => win.classList.remove('active'));
            sidebarLinks.forEach(link => link.classList.remove('active'));

            overlay.classList.add('active');
            document.getElementById(windowId).classList.add('active');
            element.classList.add('active');
        }

        // Close all windows
        function closeAllWindows() {
            overlay.classList.remove('active');
            const windows = document.querySelectorAll('.center-window');
            windows.forEach(win => win.classList.remove('active'));
            sidebarLinks.forEach(link => link.classList.remove('active'));
            homeBtn.classList.add('active');
        }

        // Bigger photos (Lightbox)
        function openLightbox(imageSrc) {
            const lightbox = document.getElementById('lightboxOverlay');
            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.src = imageSrc;
            lightbox.classList.add('active');
        }

        // Close bigger photo
        function closeLightbox() {
            const lightbox = document.getElementById('lightboxOverlay');
            lightbox.classList.remove('active');
        }
    </script>
</body>
</html>
